name: CI

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Check docs structure
        run: bash ./scripts/check-docs.sh

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check release scripts
        run: |
          test -f scripts/upload-sourcemaps.mjs
          test -f scripts/release/frontend-package.sh

      - name: Lint
        run: pnpm lint

      - name: Guard deprecated unWrap usage
        run: pnpm check:unwrap

      - name: Ensure lint does not modify files
        run: git diff --exit-code

      - name: Type check
        run: pnpm type-check

      - name: Unit tests
        run: pnpm test:unit --run

      - name: Build
        run: pnpm build
