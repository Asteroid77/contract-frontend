name: CD

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      upload_sourcemaps:
        description: 是否上传 sourcemap（需配置仓库 Secret）
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read
  actions: write

concurrency:
  group: cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist-${{ github.sha }}
          path: dist
          if-no-files-found: error
          retention-days: 7

      - name: Upload sourcemaps
        if: ${{ secrets.SOURCEMAP_RESOLVER_ENDPOINT != '' && (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.upload_sourcemaps == 'true')) }}
        run: node ./scripts/upload-sourcemaps.mjs
        env:
          DIST_DIR: ./dist/assets
          SOURCEMAP_RESOLVER_ENDPOINT: ${{ secrets.SOURCEMAP_RESOLVER_ENDPOINT }}
